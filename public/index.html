<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adult Swim Catalog - Stremio Addon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .shows {
            margin: 30px 0;
            color: #4a5568;
            font-size: 15px;
            line-height: 1.8;
        }

        .shows strong {
            color: #2d3748;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 200px;
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .install-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .install-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .copy-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .copy-btn:hover {
            background: #f7fafc;
            transform: translateY(-2px);
        }

        .copy-btn.copied {
            background: #48bb78;
            color: white;
            border-color: #48bb78;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
            color: #a0aec0;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 26px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>Adult Swim Catalog</h1>
        <p class="subtitle">Stream your favorite Adult Swim content in Stremio</p>

        <div class="shows">
            <strong>Featured Shows:</strong><br>
            Rick and Morty • Cowboy Bebop • The Boondocks<br>
            Robot Chicken • Metalocalypse • FLCL<br>
            Primal • Smiling Friends • Aqua Teen Hunger Force
        </div>

        <div class="button-group">
            <a href="/manifest.json" class="btn install-btn">
                <span>📥</span> Install Addon
            </a>
            <button onclick="copyManifest()" class="btn copy-btn" id="copyBtn">
                <span>📋</span> Copy URL
            </button>
        </div>

        <div class="footer">
            <p>23 Movies • 67 Series • 7 Genre Filters</p>
        </div>
    </div>

    <script>
        function copyManifest() {
            const url = window.location.origin + '/manifest.json';
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.classList.add('copied');
                btn.innerHTML = '<span>✓</span> Copied!';
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<span>📋</span> Copy URL';
                }, 2000);
            });
        }
    </script>
</body>
</html>
